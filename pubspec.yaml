name: annadanam_food_charity
description: A food donation charity app to connect donors, volunteers, and recipients
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core Flutter
  cupertino_icons: ^1.0.8
  
  # Database - SQLite for local storage
  sqflite: ^2.3.0
  path: ^1.8.0
  
  # Local storage
  shared_preferences: ^2.2.2
  
  # Date formatting
  intl: ^0.20.2
  
  # Image picker
  image_picker: ^1.0.5
  
  # HTTP requests
  http: ^1.1.0
  
  # Firebase (Optional - comment out if not using)
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4
  
  # Notifications
  flutter_local_notifications: ^17.2.2
  
  # Maps and Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # URL Launcher for external maps
  url_launcher: ^6.2.0
  
  # PDF and Printing
  pdf: ^3.10.7
  printing: ^5.11.1

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
  
  # Fonts section - uncomment if using custom fonts
  # fonts:
  #   - family: YourFont
  #     fonts:
  #       - asset: assets/fonts/YourFont-Regular.ttf